version: "3.9"

services:

  api:
    build:
      context: .
      dockerfile: Dockerfile

    container_name: marketdatacentralizer-api

    ports:
      - "8080:8080"

    env_file:
      - .env

    depends_on:
      redis:
        condition: service_healthy

    restart: unless-stopped

    networks:
      - marketdata-net

  redis:
    image: redis:7-alpine

    container_name: marketdatacentralizer-redis

    ports:
      - "6379:6379"

    volumes:
      - redis-data:/data

    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3

    restart: unless-stopped

    networks:
      - marketdata-net

volumes:
  redis-data:

networks:
  marketdata-net:
    driver: bridge